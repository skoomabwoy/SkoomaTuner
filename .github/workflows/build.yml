name: Build VST3

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libfreetype-dev libfontconfig1-dev libgl-dev libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package VST3 (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build/SkoomaTuner_artefacts/Release/VST3
          zip -r ../../../../SkoomaTuner-${{ matrix.name }}.zip SkoomaTuner.vst3

      - name: Package VST3 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/SkoomaTuner_artefacts/Release/VST3/SkoomaTuner.vst3 -DestinationPath SkoomaTuner-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: SkoomaTuner-${{ matrix.name }}
          path: SkoomaTuner-${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(date +%Y.%m.%d)
          gh release create "v${VERSION}" \
            --title "SkoomaTuner v${VERSION}" \
            --notes "VST3 tuner plugin for Linux, Windows, and macOS. Download the zip for your platform and extract the .vst3 bundle into your VST3 folder." \
            artifacts/SkoomaTuner-Linux/SkoomaTuner-Linux.zip \
            artifacts/SkoomaTuner-Windows/SkoomaTuner-Windows.zip \
            artifacts/SkoomaTuner-macOS/SkoomaTuner-macOS.zip
